<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Rutas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--white:#fff;--red:#cc1c1c;--red-h:#b01818;--red-light:#fdf0f0;
  --black:#111;--carbon:#2c2c2c;--gray:#6b7280;--gray-l:#e5e7eb;--gray-ll:#f9fafb;
  --green:#166534;--green-bg:#dcfce7;--amber:#92400e;--amber-bg:#fef3c7;
  --border:rgba(0,0,0,0.08);--r:10px;--sh:0 1px 4px rgba(0,0,0,0.07);
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--black);min-height:100vh}
.hidden{display:none!important}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:linear-gradient(135deg,#1a1a1a 0%,#2c2c2c 100%)}
.login-card{background:var(--white);border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.25);padding:2.5rem;max-width:360px;width:100%}
.login-brand{display:flex;align-items:center;gap:10px;margin-bottom:2rem}
.brand-icon{width:38px;height:38px;background:var(--red);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-icon svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
.brand-text h1{font-size:15px;font-weight:700;color:var(--black)}
.brand-text p{font-size:11px;color:var(--gray);margin-top:1px}
.field-label{font-size:11px;font-weight:600;color:var(--carbon);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:0.05em}
.login-input{width:100%;padding:10px 12px;border:1.5px solid var(--gray-l);border-radius:8px;font-size:14px;font-family:inherit;color:var(--black)}
.login-input:focus{outline:none;border-color:var(--red)}
.btn-login{width:100%;margin-top:14px;padding:11px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-family:inherit;cursor:pointer;font-weight:600;letter-spacing:0.02em}
.btn-login:hover{background:var(--red-h)}
.login-err{font-size:12px;color:var(--red);margin-top:8px;display:none}

/* ADMIN */
.adm-wrap{max-width:480px;margin:0 auto;padding:2rem 1rem}
.adm-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.adm-top h1{font-size:15px;font-weight:700;color:var(--black)}
.btn-sm{padding:5px 12px;background:transparent;border:1px solid var(--gray-l);border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--gray)}
.btn-sm:hover{background:var(--gray-l)}
.adm-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:1.75rem}
.drop-zone{border:1.5px dashed var(--gray-l);border-radius:8px;padding:2rem;text-align:center;cursor:pointer;transition:all 0.15s}
.drop-zone:hover,.drop-zone.over{background:var(--red-light);border-color:var(--red)}
.drop-zone p{font-size:12px;color:var(--gray);margin-top:5px}
.drop-zone strong{font-size:14px;color:var(--carbon)}
input[type=file]{display:none}
.btn-upload{display:block;width:100%;margin-top:1rem;padding:11px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-family:inherit;cursor:pointer;font-weight:600}
.btn-upload:hover{background:var(--red-h)}
.btn-upload:disabled{background:#ddd;color:#aaa;cursor:not-allowed}
.st{margin-top:1rem;font-size:13px;padding:10px 14px;border-radius:7px;display:none}
.st.ok{background:var(--green-bg);color:var(--green);display:block}
.st.err{background:var(--red-light);color:var(--red);display:block}
.st.loading{background:var(--gray-ll);color:var(--gray);display:block}
.adm-last{margin-top:1rem;font-size:12px;color:var(--gray);text-align:center}
.adm-last strong{color:var(--carbon)}
.hist{margin-top:1.25rem;padding-top:1.25rem;border-top:1px solid var(--gray-l)}
.hist-title{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;font-weight:600}
.hist-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--gray-l);font-size:12px}
.hist-item:last-child{border-bottom:none}

/* CLIENTE SHELL */
.cli-wrap{display:flex;flex-direction:column;min-height:100vh}
.cli-nav{background:var(--white);border-bottom:1px solid var(--gray-l);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.nav-brand{display:flex;align-items:center;gap:8px}
.nav-icon{width:26px;height:26px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-icon svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
.nav-title{font-size:14px;font-weight:700;color:var(--black)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-fecha{display:flex;align-items:center;gap:5px}
.nav-btn{width:26px;height:26px;border:1px solid var(--gray-l);border-radius:5px;background:var(--white);cursor:pointer;font-size:12px;color:var(--carbon);display:flex;align-items:center;justify-content:center}
.nav-btn:hover:not(:disabled){background:var(--gray-ll)}
.nav-btn:disabled{opacity:0.3;cursor:not-allowed}
.fecha-chip{font-size:12px;color:var(--carbon);background:var(--gray-ll);border-radius:5px;padding:3px 8px;font-weight:600;min-width:90px;text-align:center}
.today-lnk{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500}
.salir-btn{font-size:12px;color:var(--gray);background:none;border:none;cursor:pointer;font-family:inherit}

/* TABS */
.tabs{background:var(--white);border-bottom:1px solid var(--gray-l);padding:0 1.5rem;display:flex}
.tab{padding:10px 16px;border:none;border-bottom:2.5px solid transparent;font-size:13px;font-family:inherit;cursor:pointer;background:transparent;color:var(--gray);font-weight:500;margin-bottom:-1px;transition:color 0.15s}
.tab:hover{color:var(--carbon)}
.tab.active{color:var(--red);border-bottom-color:var(--red);font-weight:600}

.cli-body{flex:1;padding:1.25rem 1.5rem 3rem;max-width:960px;margin:0 auto;width:100%}

/* FILTERS */
.filters-bar{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:12px 16px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-label{font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap}
.filter-sel{font-size:12px;font-family:inherit;padding:5px 8px;border:1px solid var(--gray-l);border-radius:6px;color:var(--carbon);background:var(--white);cursor:pointer}
.filter-sel:focus{outline:none;border-color:var(--red)}
.filter-reset{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500;padding:4px 6px;border-radius:5px}
.filter-reset:hover{background:var(--red-light)}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.kpi{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px}
.kpi-lbl{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:7px;font-weight:600}
.kpi-val{font-size:24px;font-weight:700;color:var(--black);line-height:1}
.kpi-sub{font-size:10px;color:var(--gray);margin-top:3px}
.kpi.red-kpi{background:var(--red)}
.kpi.red-kpi .kpi-lbl{color:rgba(255,255,255,0.65)}
.kpi.red-kpi .kpi-val{color:#fff}
.kpi.red-kpi .kpi-sub{color:rgba(255,255,255,0.55)}

/* DASH ROWS */
.dash-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.dash-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.dash-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:16px}
.dash-card.full{grid-column:1/-1}
.dc-title{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px}

/* BAR CHART */
.bar-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-item:last-child{margin-bottom:0}
.bar-lbl{font-size:11px;color:var(--carbon);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:8px;background:var(--gray-l);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.4s}
.bar-pct{font-size:11px;color:var(--gray);width:34px;text-align:right;flex-shrink:0;font-weight:600}

/* ESTADO LIST */
.est-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--gray-l)}
.est-row:last-child{border-bottom:none}
.est-info{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--carbon)}
.est-n{font-size:13px;font-weight:700;color:var(--black)}
.est-pct{font-size:10px;color:var(--gray)}

/* MAPA ESTACION */
.est-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.est-tile{background:var(--gray-ll);border-radius:8px;padding:12px;text-align:center;border:1.5px solid transparent}
.est-tile.highlight{border-color:var(--red)}
.est-tile-name{font-size:11px;color:var(--gray);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.est-tile-pct{font-size:22px;font-weight:700;line-height:1}
.est-tile-sub{font-size:10px;color:var(--gray);margin-top:2px}

/* EMPRESA/ESTADO BLOCKS */
.block{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:8px;overflow:hidden}
.blk-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.blk-hd:hover{background:var(--gray-ll)}
.blk-name{font-size:13px;font-weight:600;color:var(--black)}
.blk-right{display:flex;align-items:center;gap:8px}
.pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.pill-red{background:var(--red-light);color:var(--red)}
.pill-amber{background:var(--amber-bg);color:var(--amber)}
.pill-green{background:var(--green-bg);color:var(--green)}
.chv{font-size:9px;color:#bbb}
.blk-body{border-top:1px solid var(--gray-l)}
.summ-strip{display:flex;flex-wrap:wrap;gap:12px;padding:8px 16px;background:var(--gray-ll);border-bottom:1px solid var(--gray-l)}
.si{display:flex;align-items:center;gap:4px;font-size:11px}
.si-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.si-n{font-weight:600;color:var(--black)}
.si-l{color:var(--gray)}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:10px;font-weight:700;color:var(--gray);text-align:left;padding:7px 14px;border-bottom:1px solid var(--gray-l);text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap}
td{padding:7px 14px;border-bottom:1px solid var(--gray-l);color:var(--carbon);word-break:break-word;line-height:1.4;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-ll)}
.td-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.td-time{font-size:11px;white-space:nowrap;color:var(--carbon)}
.td-empty{color:#ccc;font-size:11px}
.td-monto{font-size:11px;font-weight:600;white-space:nowrap;color:var(--carbon)}
.td-voucher{font-size:10px;color:var(--gray);word-break:break-all}
.td-tag{font-size:11px}
.no-rows{padding:12px 16px;font-size:12px;color:var(--gray);font-style:italic}
.loading-msg{text-align:center;padding:3rem;color:var(--gray);font-size:14px}
.cli-footer{text-align:center;font-size:11px;color:#bbb;margin-top:2rem;padding-bottom:1rem}

@media(max-width:700px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .dash-2,.dash-3{grid-template-columns:1fr}
  .est-grid{grid-template-columns:1fr 1fr}
  .cli-nav,.tabs{padding:0 1rem}
  .cli-body{padding:1rem 1rem 3rem}
  .nav-title{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="view-login" class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <div class="brand-text"><h1>Monitor de Rutas</h1><p>Sistema de seguimiento regional</p></div>
    </div>
    <label class="field-label">Contrasena de acceso</label>
    <input class="login-input" type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">Ingresar al sistema</button>
    <div class="login-err" id="login-err">Contrasena incorrecta</div>
  </div>
</div>

<!-- ADMIN -->
<div id="view-admin" class="hidden">
  <div class="adm-wrap">
    <div class="adm-top">
      <h1>Carga de reporte diario</h1>
      <button class="btn-sm" onclick="logout()">Salir</button>
    </div>
    <div class="adm-card">
      <div class="drop-zone" id="drop" onclick="document.getElementById('fi').click()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <strong id="drop-name">Seleccionar archivo CSV</strong>
        <p id="drop-size">O arrastra aqui · Delimitado por |</p>
        <input type="file" id="fi" accept=".csv">
      </div>
      <button class="btn-upload" id="btn-upload" disabled onclick="processFile()">Procesar y publicar</button>
      <div class="st" id="st-msg"></div>
      <div class="adm-last" id="adm-last" style="display:none">Cargado: <strong id="adm-fecha">-</strong> &middot; <strong id="adm-total">-</strong> registros</div>
      <div class="hist" id="hist-wrap" style="display:none">
        <div class="hist-title">Dias en el archivo actual</div>
        <div id="hist-items"></div>
      </div>
    </div>
  </div>
</div>

<!-- CLIENTE -->
<div id="view-cliente" class="hidden">
  <div class="cli-wrap">
    <nav class="cli-nav">
      <div class="nav-brand">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
        <span class="nav-title">Monitor de Rutas</span>
      </div>
      <div class="nav-right">
        <div class="nav-fecha">
          <button class="nav-btn" id="btn-prev" onclick="navDia(1)" title="Dia anterior">&#8592;</button>
          <span class="fecha-chip" id="fecha-label">-</span>
          <button class="nav-btn" id="btn-next" onclick="navDia(-1)" title="Dia siguiente">&#8594;</button>
          <button class="today-lnk" id="btn-today" onclick="irHoy()" style="display:none">Hoy</button>
        </div>
        <button class="salir-btn" onclick="logout()">Salir</button>
      </div>
    </nav>
    <div class="tabs">
      <button class="tab active" id="tab-dashboard" onclick="setView('dashboard')">Dashboard</button>
      <button class="tab" id="tab-empresa" onclick="setView('empresa')">Por empresa</button>
      <button class="tab" id="tab-estado" onclick="setView('estado')">Por estado</button>
    </div>
    <div class="cli-body">
      <div id="reporte-content"><div class="loading-msg">Cargando datos...</div></div>
      <div class="cli-footer" id="cli-footer"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
var API_URL='/api/data';
var PASS_ADMIN='admin2024', PASS_CLIENT='rutas2024';

var CLIENTES=[
  {key:'avicolavillalobos',label:'Avicola Villalobos',  match:['avicola villalobos']},
  {key:'lacentral',        label:'La Central del Pollo',match:['la central del pollo rey','central del pollo rey']},
  {key:'pollocampero',     label:'Pollo Campero',       match:['pollo campero']},
  {key:'pollogranjero',    label:'Pollo Granjero',      match:['pollo granjero']},
  {key:'pizzasiciliana',   label:'Pizza Siciliana',     match:['pizza siciliana']},
  {key:'molinosmodernos',  label:'Molinos Modernos',    match:['molinos modernos']},
];
var IND_KEYS=['pizzasiciliana','pollocampero','pollogranjero'];

var EP={
  'ASIGNADO':0,'LOCAL CERRADO':1,'POSITIVO SIN VALORES':2,
  'ATM CERRADO':2,'NO SE ENCUENTRA ENCARGADO':2,'PADRON O PORTACION DE ARMAS':2,
  'ENTREGADO':3,'ATENDIDO':3,'POSITIVO CON VALORES':4
};
var EXCLUIR=['ASIGNADO','LOCAL CERRADO'];

var EC={
  'POSITIVO CON VALORES':'#16a34a','POSITIVO SIN VALORES':'#d97706',
  'LOCAL CERRADO':'#cc1c1c','ASIGNADO':'#9ca3af','ATM CERRADO':'#7c3aed',
  'NO SE ENCUENTRA ENCARGADO':'#ea580c','PADRON O PORTACION DE ARMAS':'#dc2626',
  'ENTREGADO':'#2563eb','ATENDIDO':'#2563eb'
};
var EL={
  'POSITIVO CON VALORES':'Positivo con valores','POSITIVO SIN VALORES':'Positivo sin valores',
  'LOCAL CERRADO':'Local cerrado','ASIGNADO':'Asignado','ATM CERRADO':'ATM cerrado',
  'NO SE ENCUENTRA ENCARGADO':'No se encuentra encargado',
  'PADRON O PORTACION DE ARMAS':'Portacion de armas','ENTREGADO':'Entregado','ATENDIDO':'Atendido'
};
var EORD=['POSITIVO CON VALORES','POSITIVO SIN VALORES','ENTREGADO','ATENDIDO','LOCAL CERRADO','ATM CERRADO','NO SE ENCUENTRA ENCARGADO','PADRON O PORTACION DE ARMAS','ASIGNADO'];

var fileText=null,historial=[],diaActual=0,vistaActual='dashboard';
var fEmpresa='',fEstacion='',fTipoRuta='';

function show(id){['login','admin','cliente'].forEach(function(v){document.getElementById('view-'+v).classList.toggle('hidden',v!==id);});}
function doLogin(){
  var pw=document.getElementById('pw-input').value.trim();
  document.getElementById('login-err').style.display='none';
  if(pw===PASS_ADMIN){show('admin');loadAdmin();}
  else if(pw===PASS_CLIENT){show('cliente');loadCliente();}
  else{document.getElementById('login-err').style.display='block';}
}
function logout(){document.getElementById('pw-input').value='';historial=[];diaActual=0;fEmpresa='';fEstacion='';fTipoRuta='';show('login');}

function setView(v){
  vistaActual=v;
  ['dashboard','empresa','estado'].forEach(function(t){document.getElementById('tab-'+t).classList.toggle('active',t===v);});
  renderDia();
}

function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function matchC(origen){
  var n=norm(origen);
  for(var i=0;i<CLIENTES.length;i++)for(var j=0;j<CLIENTES[i].match.length;j++)if(n.indexOf(norm(CLIENTES[i].match[j]))!==-1)return CLIENTES[i].key;
  return null;
}
function fmtT(dt){if(!dt||dt.indexOf('1901')===0)return '';var p=dt.split(' ');return p[1]?p[1].slice(0,5):'';}
function fmtQ(m){if(!m||m===0)return '';return 'Q '+parseFloat(m).toLocaleString('es-GT',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtV(v){if(!v)return '';return(v+'').replace(/\[|\]/g,'').replace(/\s+/g,' ').trim();}
function tc(s){return(s||'').toLowerCase().replace(/\b\w/g,function(c){return c.toUpperCase();});}
function fmtFecha(f){if(!f)return '-';var d=new Date(f+'T12:00:00');return d.toLocaleDateString('es-GT',{day:'2-digit',month:'short',year:'numeric'});}
function pillC(p){return p>=80?'pill-green':p>=60?'pill-amber':'pill-red';}
function barColor(p){return p>=80?'#16a34a':p>=60?'#d97706':'#cc1c1c';}
function setSt(msg,t){var el=document.getElementById('st-msg');el.textContent=msg;el.className='st '+t;}

// ── ADMIN ──
var drop=document.getElementById('drop'),fi=document.getElementById('fi');
fi.addEventListener('change',function(e){if(e.target.files[0])loadFile(e.target.files[0]);});
drop.addEventListener('dragover',function(e){e.preventDefault();drop.classList.add('over');});
drop.addEventListener('dragleave',function(){drop.classList.remove('over');});
drop.addEventListener('drop',function(e){e.preventDefault();drop.classList.remove('over');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
function loadFile(f){
  document.getElementById('drop-name').textContent=f.name;
  document.getElementById('drop-size').textContent=(f.size/1024).toFixed(1)+' KB';
  document.getElementById('btn-upload').disabled=false;
  document.getElementById('st-msg').className='st';
  var r=new FileReader();r.onload=function(ev){fileText=ev.target.result;};r.readAsText(f,'UTF-8');
}

function processFile(){
  if(!fileText){setSt('No hay archivo.','err');return;}
  try{
    var res=Papa.parse(fileText,{header:true,delimiter:Papa.RECORD_SEP,skipEmptyLines:true,quoteChar:'\x00'});
    // Auto-detect delimiter if PapaParse didn't split columns correctly
    if(res.data.length&&Object.keys(res.data[0]).length<=2){
      var delimiters=['|',';',',','\t'];
      for(var di=0;di<delimiters.length;di++){
        var tr=Papa.parse(fileText,{header:true,delimiter:delimiters[di],skipEmptyLines:true});
        if(tr.data.length&&Object.keys(tr.data[0]).length>5){res=tr;break;}
      }
    }
    var rows=res.data;if(!rows.length){setSt('Archivo vacio.','err');return;}
    var pF={};
    // Auto-detect date column name (handles BOM, encoding variants)
    var fechaCol='Fecha de Servicio';
    if(rows.length){var keys=Object.keys(rows[0]);var fc=keys.filter(function(k){return k.toLowerCase().indexOf('fecha')!==-1;});if(fc.length)fechaCol=fc[0];}
    rows.forEach(function(r){
      var rawFecha=(r[fechaCol]||'').trim();
      var d='';
      if(rawFecha.indexOf('/')!==-1){
        // Format DD/MM/YYYY -> YYYY-MM-DD
        var parts=rawFecha.split('/');
        if(parts.length===3) d=parts[2].slice(0,4)+'-'+parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0');
      } else {
        d=rawFecha.slice(0,10);
      }
      if(!d||d.length<8)return;
      if(!pF[d])pF[d]=[];pF[d].push(r);
    });
    var dias=Object.keys(pF).sort();
    setSt('Detectados '+dias.length+' dia(s): '+dias.join(', ')+'. Publicando...','loading');
    var nuevos=dias.map(function(fecha){
      var fRows=pF[fecha],pMap={};
      fRows.forEach(function(r){
        var origen=(r['Origen']||'').trim();
        var estado=(r['Estado']||r['Status']||'').trim().toUpperCase();
        var ck=matchC(origen);if(!ck)return;
        var estacion=(r['Estacion']||'').trim();
        var tipoRuta=(r['Tipo de Ruta']||'').trim().toUpperCase();
        var ruta=(r['Ruta']||'').trim();
        var servicio=(r['Serivicio']||'').trim();
        var entrada=fmtT(r['Hora Recoleccion'])||fmtT(r['Hora Entrega']);
        var salida=fmtT(r['Fin Hora Recoleccion'])||fmtT(r['Fin Hora Entrega']);
        var monto=parseFloat(r['Monto Local'])||0;
        var vouchers=(r['Vouchers']||'').trim();
        var prio=EP[estado]!==undefined?EP[estado]:1;
        var ex=pMap[origen];
        if(!ex||(EP[ex.estado]||0)<prio){
          pMap[origen]={punto:origen,estado:estado,estacion:estacion,tipoRuta:tipoRuta,ruta:ruta,servicio:servicio,entrada:entrada,salida:salida,monto:monto,vouchers:vouchers,cliente:ck};
        }
      });
      var clientes={};
      CLIENTES.forEach(function(c){clientes[c.key]={total:0,efectivos:0,puntos:[]};});
      var porEstado={},porEstacion={},porTipoRuta={};
      Object.keys(pMap).forEach(function(k){
        var p=pMap[k];
        clientes[p.cliente].total++;
        if(EXCLUIR.indexOf(p.estado)===-1)clientes[p.cliente].efectivos++;
        clientes[p.cliente].puntos.push(p);
        if(!porEstado[p.estado])porEstado[p.estado]=[];porEstado[p.estado].push(p);
        if(p.estacion){if(!porEstacion[p.estacion])porEstacion[p.estacion]={total:0,ef:0};porEstacion[p.estacion].total++;if(EXCLUIR.indexOf(p.estado)===-1)porEstacion[p.estacion].ef++;}
        if(p.tipoRuta){if(!porTipoRuta[p.tipoRuta])porTipoRuta[p.tipoRuta]={total:0,ef:0};porTipoRuta[p.tipoRuta].total++;if(EXCLUIR.indexOf(p.estado)===-1)porTipoRuta[p.tipoRuta].ef++;}
      });
      return{fecha:fecha,clientes:clientes,porEstado:porEstado,porEstacion:porEstacion,porTipoRuta:porTipoRuta,procesado:new Date().toISOString(),totalRows:fRows.length};
    });
    publishData(nuevos);
  }catch(e){setSt('Error: '+e.message,'err');}
}

function publishData(nuevos){
  document.getElementById('btn-upload').disabled=true;
  var dias=nuevos.slice().sort(function(a,b){return b.fecha.localeCompare(a.fecha);});
  fetch(API_URL,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({historial:dias,v:3})})
    .then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      var total=nuevos.reduce(function(s,d){return s+d.totalRows;},0);
      setSt('Publicado — '+dias.length+' dia(s) — '+total.toLocaleString()+' registros.','ok');
      document.getElementById('adm-last').style.display='block';
      document.getElementById('adm-fecha').textContent=dias.map(function(d){return d.fecha;}).join(', ');
      document.getElementById('adm-total').textContent=total.toLocaleString();
      renderHistAdmin(dias);
    })
    .catch(function(e){setSt('Error al publicar: '+e.message,'err');})
    .finally(function(){document.getElementById('btn-upload').disabled=false;});
}

function loadAdmin(){
  fetch(API_URL,{headers:{'Accept':'application/json'}})
    .then(function(r){return r.ok?r.json():{};})
    .then(function(d){
      var dias=Array.isArray(d.historial)?d.historial:[];
      if(dias.length){
        document.getElementById('adm-last').style.display='block';
        document.getElementById('adm-fecha').textContent=dias.map(function(x){return x.fecha;}).join(', ');
        document.getElementById('adm-total').textContent=dias.reduce(function(s,x){return s+(x.totalRows||0);},0).toLocaleString();
        renderHistAdmin(dias);
      }
    }).catch(function(){});
}
function renderHistAdmin(dias){
  document.getElementById('hist-wrap').style.display='block';
  document.getElementById('hist-items').innerHTML=dias.map(function(d){return'<div class="hist-item"><span>'+fmtFecha(d.fecha)+'</span><span style="color:#aaa">'+(d.totalRows||0).toLocaleString()+' reg</span></div>';}).join('');
}

// ── CLIENTE ──
function loadCliente(){
  fetch(API_URL)
    .then(function(r){if(!r.ok)throw new Error();return r.json();})
    .then(function(d){
      historial=Array.isArray(d.historial)?d.historial:[];
      if(!historial.length){document.getElementById('reporte-content').innerHTML='<div class="loading-msg">Sin datos. El admin aun no ha cargado reportes.</div>';return;}
      diaActual=0;renderDia();
    })
    .catch(function(){document.getElementById('reporte-content').innerHTML='<div class="loading-msg">Error al cargar. Recarga la pagina.</div>';});
}
function navDia(dir){var n=diaActual+dir;if(n<0||n>=historial.length)return;diaActual=n;fEmpresa='';fEstacion='';fTipoRuta='';renderDia();}
function irHoy(){diaActual=0;fEmpresa='';fEstacion='';fTipoRuta='';renderDia();}

function renderDia(){
  var dia=historial[diaActual];if(!dia)return;
  document.getElementById('btn-prev').disabled=(diaActual>=historial.length-1);
  document.getElementById('btn-next').disabled=(diaActual<=0);
  document.getElementById('btn-today').style.display=diaActual>0?'inline':'none';
  document.getElementById('fecha-label').textContent=fmtFecha(dia.fecha);
  var content=document.getElementById('reporte-content');
  if(vistaActual==='dashboard') content.innerHTML=buildDashboard(dia);
  else if(vistaActual==='empresa') content.innerHTML=buildEmpresaView(dia);
  else content.innerHTML=buildEstadoView(dia);
  var proc=new Date(dia.procesado);
  document.getElementById('cli-footer').textContent='Actualizado: '+proc.toLocaleString('es-GT',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})+(historial.length>1?' · '+historial.length+' dias disponibles':'');
}

function getFilteredPuntos(dia){
  var all=[];
  CLIENTES.forEach(function(c){
    if(fEmpresa&&fEmpresa!==c.key)return;
    (dia.clientes[c.key]||{puntos:[]}).puntos.forEach(function(p){
      if(fEstacion&&p.estacion!==fEstacion)return;
      if(fTipoRuta&&p.tipoRuta!==fTipoRuta)return;
      all.push(p);
    });
  });
  return all;
}

function buildFilters(dia){
  var estaciones=Object.keys(dia.porEstacion||{}).sort();
  var tiposRuta=Object.keys(dia.porTipoRuta||{}).sort();
  var empOpts=CLIENTES.map(function(c){return '<option value="'+c.key+'"'+(fEmpresa===c.key?' selected':'')+'>'+c.label+'</option>';}).join('');
  var estOpts=estaciones.map(function(e){return '<option value="'+e+'"'+(fEstacion===e?' selected':'')+'>'+e+'</option>';}).join('');
  var tipOpts=tiposRuta.map(function(t){return '<option value="'+t+'"'+(fTipoRuta===t?' selected':'')+'>'+tc(t)+'</option>';}).join('');
  return '<div class="filters-bar">'+
    '<span class="filter-label">Filtrar:</span>'+
    '<div class="filter-group"><span class="filter-label">Empresa</span><select class="filter-sel" onchange="fEmpresa=this.value;renderDia()"><option value="">Todas</option>'+empOpts+'</select></div>'+
    '<div class="filter-group"><span class="filter-label">Estacion</span><select class="filter-sel" onchange="fEstacion=this.value;renderDia()"><option value="">Todas</option>'+estOpts+'</select></div>'+
    '<div class="filter-group"><span class="filter-label">Tipo de ruta</span><select class="filter-sel" onchange="fTipoRuta=this.value;renderDia()"><option value="">Todos</option>'+tipOpts+'</select></div>'+
    ((fEmpresa||fEstacion||fTipoRuta)?'<button class="filter-reset" onclick="fEmpresa=\'\';fEstacion=\'\';fTipoRuta=\'\';renderDia()">&#10005; Limpiar</button>':'')+
  '</div>';
}

// ── DASHBOARD ──
function buildDashboard(dia){
  var puntos=getFilteredPuntos(dia);
  var total=puntos.length,efectivos=0,pcv=0,psv=0,lc=0,asig=0,montoTotal=0;
  puntos.forEach(function(p){
    if(EXCLUIR.indexOf(p.estado)===-1)efectivos++;
    if(p.estado==='POSITIVO CON VALORES'){pcv++;montoTotal+=p.monto||0;}
    if(p.estado==='POSITIVO SIN VALORES')psv++;
    if(p.estado==='LOCAL CERRADO')lc++;
    if(p.estado==='ASIGNADO')asig++;
  });
  var pct=total>0?Math.round(efectivos/total*100):0;

  // Indicador 3 empresas
  var totalInd=0,efInd=0;
  IND_KEYS.forEach(function(k){
    if(fEmpresa&&fEmpresa!==k)return;
    var cd=dia.clientes[k]||{puntos:[]};
    var pts=cd.puntos.filter(function(p){return(!fEstacion||p.estacion===fEstacion)&&(!fTipoRuta||p.tipoRuta===fTipoRuta);});
    totalInd+=pts.length;
    efInd+=pts.filter(function(p){return EXCLUIR.indexOf(p.estado)===-1;}).length;
  });
  var pctInd=totalInd>0?Math.round(efInd/totalInd*100):0;

  // KPIs
  var kpis='<div class="kpi-grid">'+
    '<div class="kpi red-kpi"><div class="kpi-lbl">Efectividad general</div><div class="kpi-val">'+pct+'%</div><div class="kpi-sub">'+efectivos+' efectivos de '+total+'</div></div>'+
    '<div class="kpi"><div class="kpi-lbl">Pizza · Campero · Granjero</div><div class="kpi-val">'+pctInd+'%</div><div class="kpi-sub">'+efInd+' de '+totalInd+' servicios</div></div>'+
    '<div class="kpi"><div class="kpi-lbl">Positivos con valores</div><div class="kpi-val">'+pcv+'</div><div class="kpi-sub">'+fmtQ(montoTotal)+' recaudado</div></div>'+
    '<div class="kpi"><div class="kpi-lbl">Sin valores / Pendientes</div><div class="kpi-val">'+psv+'</div><div class="kpi-sub">'+asig+' asignados sin visitar</div></div>'+
    '<div class="kpi"><div class="kpi-lbl">Local cerrado</div><div class="kpi-val">'+lc+'</div><div class="kpi-sub">no efectivos</div></div>'+
  '</div>';

  // Efectividad por empresa
  var empBars=CLIENTES.filter(function(c){return!fEmpresa||fEmpresa===c.key;}).map(function(c){
    var pts=(dia.clientes[c.key]||{puntos:[]}).puntos.filter(function(p){return(!fEstacion||p.estacion===fEstacion)&&(!fTipoRuta||p.tipoRuta===fTipoRuta);});
    var ef=pts.filter(function(p){return EXCLUIR.indexOf(p.estado)===-1;}).length;
    var p=pts.length>0?Math.round(ef/pts.length*100):0;
    return'<div class="bar-item"><span class="bar-lbl" title="'+c.label+'">'+c.label+'</span><div class="bar-track"><div class="bar-fill" style="width:'+p+'%;background:'+barColor(p)+'"></div></div><span class="bar-pct">'+p+'%</span></div>';
  }).join('');

  // Efectividad por estacion
  var estTiles=Object.keys(dia.porEstacion||{}).filter(function(e){return!fEstacion||fEstacion===e;}).sort().map(function(e){
    // recalculate with filters applied
    var pts=puntos.filter(function(p){return p.estacion===e;});
    var ef=pts.filter(function(p){return EXCLUIR.indexOf(p.estado)===-1;}).length;
    var t=pts.length;
    var p=t>0?Math.round(ef/t*100):0;
    var col=barColor(p);
    return'<div class="est-tile" style="border-color:'+(p<60?'var(--red)':p<80?'#d97706':'var(--gray-l)')+'">'+
      '<div class="est-tile-name">'+e+'</div>'+
      '<div class="est-tile-pct" style="color:'+col+'">'+p+'%</div>'+
      '<div class="est-tile-sub">'+ef+' / '+t+'</div>'+
    '</div>';
  }).join('');

  // Por tipo de ruta
  var tipoBars=Object.keys(dia.porTipoRuta||{}).filter(function(t){return!fTipoRuta||fTipoRuta===t;}).sort().map(function(t){
    var pts=puntos.filter(function(p){return p.tipoRuta===t;});
    var ef=pts.filter(function(p){return EXCLUIR.indexOf(p.estado)===-1;}).length;
    var tot=pts.length;
    var p=tot>0?Math.round(ef/tot*100):0;
    return'<div class="bar-item"><span class="bar-lbl">'+tc(t)+'</span><div class="bar-track"><div class="bar-fill" style="width:'+p+'%;background:'+barColor(p)+'"></div></div><span class="bar-pct">'+p+'%</span></div>';
  }).join('');

  // Distribucion estados
  var estDist=EORD.filter(function(e){return puntos.some(function(p){return p.estado===e;});}).map(function(e){
    var n=puntos.filter(function(p){return p.estado===e;}).length;
    var pct2=total>0?Math.round(n/total*100):0;
    return'<div class="est-row"><span class="est-info"><span class="si-dot" style="background:'+(EC[e]||'#aaa')+';display:inline-block;width:8px;height:8px;border-radius:50%"></span>'+(EL[e]||e)+'</span><div style="display:flex;align-items:center;gap:8px"><span class="est-pct">'+pct2+'%</span><span class="est-n">'+n+'</span></div></div>';
  }).join('');

  return buildFilters(dia)+kpis+
    '<div class="dash-2">'+
      '<div class="dash-card"><div class="dc-title">Efectividad por empresa</div>'+empBars+'</div>'+
      '<div class="dash-card"><div class="dc-title">Distribucion por estado</div>'+estDist+'</div>'+
    '</div>'+
    '<div class="dash-card full" style="margin-bottom:12px"><div class="dc-title">Efectividad por estacion / departamento</div><div class="est-grid">'+estTiles+'</div></div>'+
    '<div class="dash-card full"><div class="dc-title">Efectividad por tipo de ruta</div>'+tipoBars+'</div>';
}

// ── EMPRESA VIEW ──
function buildEmpresaView(dia){
  var filtros=buildFilters(dia);
  var blocks=CLIENTES.filter(function(c){return!fEmpresa||fEmpresa===c.key;}).map(function(c){
    var cd=dia.clientes[c.key]||{total:0,efectivos:0,puntos:[]};
    var puntos=cd.puntos.filter(function(p){
      return(!fEstacion||p.estacion===fEstacion)&&(!fTipoRuta||p.tipoRuta===fTipoRuta)&&p.estado!=='POSITIVO CON VALORES';
    });
    var allPts=cd.puntos.filter(function(p){return(!fEstacion||p.estacion===fEstacion)&&(!fTipoRuta||p.tipoRuta===fTipoRuta);});
    var ef=allPts.filter(function(p){return EXCLUIR.indexOf(p.estado)===-1;}).length;
    var pct=allPts.length>0?Math.round(ef/allPts.length*100):0;
    var id='emp-'+c.key;
    var counts={};allPts.forEach(function(p){counts[p.estado]=(counts[p.estado]||0)+1;});
    var summ=EORD.filter(function(e){return counts[e];}).map(function(e){return'<div class="si"><span class="si-dot" style="background:'+(EC[e]||'#aaa')+'"></span><span class="si-n">'+counts[e]+'</span><span class="si-l">'+(EL[e]||e)+'</span></div>';}).join('');
    return'<div class="block"><div class="blk-hd" onclick="toggle(\''+id+'\')"><span class="blk-name">'+c.label+'</span><div class="blk-right"><span style="font-size:11px;color:#9ca3af">'+allPts.length+' servicios</span><span class="pill '+pillC(pct)+'">'+pct+'%</span><span class="chv" id="chv-'+id+'">&#9660;</span></div></div><div class="blk-body" id="'+id+'">'+(summ?'<div class="summ-strip">'+summ+'</div>':'')+buildTable(puntos,false)+'</div></div>';
  }).join('');
  return filtros+blocks;
}

// ── ESTADO VIEW ──
function buildEstadoView(dia){
  var filtros=buildFilters(dia);
  var puntos=getFilteredPuntos(dia);
  var html='';
  EORD.forEach(function(estado){
    var pts=puntos.filter(function(p){return p.estado===estado;});
    if(!pts.length)return;
    var id='est-'+estado.replace(/\W/g,'_');
    html+='<div class="block"><div class="blk-hd" onclick="toggle(\''+id+'\')"><span class="blk-name" style="display:flex;align-items:center;gap:7px"><span class="si-dot" style="background:'+(EC[estado]||'#aaa')+';display:inline-block;width:8px;height:8px;border-radius:50%"></span>'+(EL[estado]||estado)+' <span style="font-size:11px;color:#9ca3af;font-weight:400">'+pts.length+'</span></span><span class="chv" id="chv-'+id+'">&#9660;</span></div><div class="blk-body" id="'+id+'">'+buildTable(pts,true)+'</div></div>';
  });
  return filtros+(html||'<div class="loading-msg">Sin datos con los filtros aplicados.</div>');
}

function toggle(id){var el=document.getElementById(id),chv=document.getElementById('chv-'+id);var open=el.style.display!=='none';el.style.display=open?'none':'';chv.innerHTML=open?'&#9654;':'&#9660;';}

function sortP(p){return p.slice().sort(function(a,b){var ao=EORD.indexOf(a.estado),bo=EORD.indexOf(b.estado);return(ao===-1?99:ao)!==(bo===-1?99:bo)?(ao===-1?99:ao)-(bo===-1?99:bo):(a.punto||'').localeCompare(b.punto||'');});}

function buildTable(puntos,showEmp){
  if(!puntos.length)return'<div class="no-rows">Sin incidencias.</div>';
  var sorted=sortP(puntos);
  var ths='<th style="width:32%">Punto</th><th style="width:14%">'+(showEmp?'Empresa':'Estado')+'</th><th style="width:12%">Estacion</th><th style="width:9%">Entrada</th><th style="width:9%">Salida</th><th style="width:13%">Monto</th><th style="width:11%">Voucher</th>';
  var rows=sorted.map(function(p){
    var col=EC[p.estado]||'#aaa',lbl=EL[p.estado]||p.estado;
    var col2=showEmp?(function(){var c=CLIENTES.filter(function(c){return c.key===p.cliente;})[0];return c?'<span style="font-size:11px;color:var(--carbon)">'+c.label+'</span>':'';})():('<span class="td-tag" style="color:'+col+'">'+lbl+'</span>');
    var ent=p.entrada?'<span class="td-time">'+p.entrada+'</span>':'<span class="td-empty">-</span>';
    var sal=p.salida?'<span class="td-time">'+p.salida+'</span>':'<span class="td-empty">-</span>';
    var mon=p.estado==='POSITIVO CON VALORES'&&p.monto?'<span class="td-monto">'+fmtQ(p.monto)+'</span>':'<span class="td-empty">-</span>';
    var vou=p.estado==='POSITIVO CON VALORES'&&p.vouchers?'<span class="td-voucher">'+fmtV(p.vouchers)+'</span>':'<span class="td-empty">-</span>';
    return'<tr><td><span class="td-dot" style="background:'+col+'"></span>'+tc(p.punto)+'</td><td>'+col2+'</td><td style="font-size:11px;color:var(--gray)">'+p.estacion+'</td><td>'+ent+'</td><td>'+sal+'</td><td>'+mon+'</td><td>'+vou+'</td></tr>';
  }).join('');
  return'<table><thead><tr>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table>';
}
